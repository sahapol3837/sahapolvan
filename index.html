<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ผังครอบครัวของฉัน</title>
    <style>
      /* พื้นหลังหน้าเว็บและพื้นที่วาดผัง */
#tree-container {
    position: relative;
    width: 2000px;
    height: 1000px;
    background-color: #f9f9f9;
}

/* แผ่นใส SVG - แก้ไขตรงนี้ให้กางเต็มพื้นที่กว้างยาวของคอนเทนเนอร์ */
#svg-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 2000px;  /* บังคับความกว้างให้เท่ากับตัว container */
    height: 1000px; /* บังคับความสูงให้เท่ากับตัว container */
    z-index: 1;    /* อยู่ด้านหลังกล่องข้อความ */
    pointer-events: none; /* เพื่อให้สามารถคลิกทะลุเส้นไปโดนกล่องได้ */
}

/* สไตล์ของกล่องข้อความบุคคล */
.person-box {
    position: absolute;
    width: 140px;
    height: 60px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    font-weight: bold;
    z-index: 2; /* อยู่เหนือกราฟเส้น SVG เสมอ */
}
.male { background-color: #e3f2fd; border: 2px solid #2196f3; }
.female { background-color: #fce4ec; border: 2px solid #e91e63; }

/* สไตล์ของเส้นเชื่อมโยง - ปรับสีให้เข้มขึ้นชัดเจน */
.tree-line { 
    stroke: #2c3e50; /* สีเทาเข้มเกือบดำ */
    stroke-width: 3px; /* เพิ่มความหนาของเส้น */
    fill: none; 
}
.divorced-line { 
    stroke-dasharray: 6,6; /* ระยะไข่ปลาของเส้นประ */
    stroke: #e74c3c; /* สีแดงสำหรับเส้นหย่าร้าง */
}

    </style>
</head>
<body>

    <!-- พื้นที่แสดงผลผังครอบครัว -->
    <div id="tree-container">
        <svg id="svg-layer"></svg>
    </div>

    <!-- เชื่อมไฟล์ JavaScript -->
    <script src="app.js"></script>
</body>
</html>
